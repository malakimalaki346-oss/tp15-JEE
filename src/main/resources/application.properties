# Configuration MySQL pour Docker
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/malak_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:secret123}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Port du serveur
server.port=8080

# Configuration des logs
logging.level.org.springframework.web=INFO
logging.level.ma.ens.malakapp=DEBUG